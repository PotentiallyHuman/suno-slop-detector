<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>🤖 Suno Slop Detector</h1>

    <div id="page-status" class="card">
      <div id="page-msg" class="muted">Checking this tab…</div>
      <div id="page-result" hidden>
        <span id="page-score" class="big"></span>
        <span id="page-label" class="muted"></span>
      </div>
    </div>

    <details class="card">
      <summary>Paste any lyrics to test ▾</summary>
      <textarea id="paste" rows="8" placeholder="Paste lyrics here…"></textarea>
      <div class="paste-actions">
        <button id="analyze">Analyze</button>
        <button id="humanize" class="ghost" hidden>Humanize Line</button>
        <button id="rewrite" class="ghost" hidden>Humanize Rewrite</button>
        <button id="undo" class="ghost" hidden>Undo</button>
      </div>
      <div id="paste-result" hidden>
        <span id="paste-score" class="big"></span>
        <span id="paste-label" class="muted"></span>
        <div id="paste-msg" class="paste-msg" hidden></div>
        <div id="paste-craft" class="craft"></div>
      </div>
    </details>

    <p class="foot">
      On a <code>suno.com/song/…</code> page it reads <b>only</b> the lyrics box.
      It analyses nothing anywhere else. Heuristic for fun — not proof.
    </p>

    <script src="slop-core.js"></script>
    <script src="common_words.js"></script>
    <script src="features.js"></script>
    <script src="ext/patterns.browser.js"></script>
    <script src="ext/tier3.browser.js"></script>
    <script src="ext/perspectives.browser.js"></script>
    <script src="ext/model.js"></script>
    <script src="ext/model_v5.browser.js"></script>
    <script src="ext/portability_tells.browser.js"></script>
    <script src="ext/clean-lyrics.js"></script>
    <script src="ext/v2-engine.js"></script>
    <script src="ext/model_v8.browser.js"></script>
    <script src="ext/craft_features.browser.js"></script>
    <script src="ext/v8-score.browser.js"></script>
    <script src="ext/humanizer_model_p1.browser.js"></script>
    <script src="ext/humanizer_model_p2.browser.js"></script>
    <script src="ext/humanizer_model_p3.browser.js"></script>
    <script src="ext/cliche_swaps.browser.js"></script>
    <script src="ext/humanizer-gen.browser.js"></script>
    <script src="ext/v2-panel.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
